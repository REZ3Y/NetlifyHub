services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: netlifyhub
      POSTGRES_PASSWORD: netlifyhub
      POSTGRES_DB: netlifyhub
    ports:
      - '5432:5432'
    volumes:
      - netlifyhub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U netlifyhub -d netlifyhub']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://netlifyhub:netlifyhub@postgres:5432/netlifyhub?schema=public
      REDIS_URL: redis://redis:6379
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-NetlifyHub}
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  netlifyhub_pg:
