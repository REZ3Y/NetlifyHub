# Production stack. Put settings in repo-root `.env` (Compose reads it automatically).
# Backup template locally: `.env.production` → copy contents to `.env` on the server.
#   docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: netlifyhub
      POSTGRES_PASSWORD: netlifyhub
      POSTGRES_DB: netlifyhub
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - netlifyhub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U netlifyhub -d netlifyhub']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-NetlifyHub}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://netlifyhub:netlifyhub@postgres:5432/netlifyhub?schema=public
      REDIS_URL: redis://redis:6379
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-local-dev-token-encryption-key-min-32chars}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      STATIC_WEB_ROOT: /app/apps/web/dist
      UPLOAD_STORAGE_PATH: /app/data/uploads
    ports:
      - '3000:3000'
    volumes:
      - netlifyhub_uploads:/app/data/uploads
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://netlifyhub:netlifyhub@postgres:5432/netlifyhub?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-local-dev-token-encryption-key-min-32chars}
      TELEGRAM_QUOTA_CRON_PATTERN: ${TELEGRAM_QUOTA_CRON_PATTERN:-"0 * * * *"}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  netlifyhub_pg:
  netlifyhub_uploads:
